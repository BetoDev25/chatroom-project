name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Build
        run: go build -o chat-app
      
      - name: Deploy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "chat-app,static, sql/schema"
          target: "/home/ec2-user/chatroom-project"
      
        #migrations
      - name: Run migrations
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/chatroom-project
            export DB_URL="postgres://betochat:chat-with-beto25@go-chat-db.cszw62ie64kz.us-east-1.rds.amazonaws.com:5432/postgres?sslmode=require"
            ~/go/bin/goose -dir sql/schema postgres "$DB_URL" up

      - name: Restart service
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/chatroom-project
            sudo systemctl restart chat-app