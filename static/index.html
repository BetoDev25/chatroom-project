<!DOCTYPE html>
<html>
<head>
    <title>Go Chat</title>
    <style>
        .container {
            display: flex;
            gap: 20px;
            width: 100%;
        }
        .chat-section {
            flex: 3;
        }
        .tab.active {
            background: #ff4444;
            color: white;
            border-color: #ff4444;
        }
        #messages { height: 300px; width: 50%; margin: 0; box-sizing: border-box; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; }
        .system { color: #888; font-style: italic; }
    </style>
</head>
<body>
    <button onclick="logout()" style="position: fixed; top: 10px; right: 10px; padding: 8px 16px;">Logout</button>
    <h1>Go Chat with Rooms</h1>
    <h2 id="welcome"></h2>
    <div class="container">
        <div class="chat-section">
            <div style="margin-bottom: 10px;">
                <input type="text" id="room" placeholder="Room name" style="padding: 6px;">
            </div>
            <div style="margin-bottom: 10px;">
                <button onclick="joinRoom(false)" style="padding: 6px 12px;">Join Room</button>
                <button onclick="createRoom()" style="padding: 6px 12px;">Create Room</button>
            </div>
            <!-- Tabs -->
            <div id="tabBar" style="display: flex; 
            gap: 4px; padding: 8px 0; border-bottom: 2px solid #ccc; margin-bottom: 10px; min-height: 40px;">
            </div>
            <!-- End of tabs -->
            <div id="roomError" style="color: red; margin-top: 10px;"></div>
            <div id="messages"></div>
            <div>
                <input type="text" id="message" placeholder="Message" onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
    <script src="/static/js/api.js"></script>
    <script>
        let tabs = [];
        let activeTabId = null;
        let ws;

        function connect() {
            //const username = document.getElementById('username').value || 'anonymous';
            if (!currentUser) return;
            ws = new WebSocket(`ws://localhost:8080/ws?username=${currentUser.username}`);

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                const div = document.createElement('div');
                if (msg.type === 'join' || msg.type === 'leave') {
                    div.className = 'system';
                    div.textContent = msg.content;
                } else {
                    div.textContent = `${msg.username}: ${msg.content}`;
                }
                document.getElementById('messages').appendChild(div);
            };
        }

        let currentRoom = null;
        async function joinRoom(skipArchive = false, isCreation = false) {
            const roomName = document.getElementById('room').value;
            document.getElementById('room').value = '';

            const response = await fetch(`/api/rooms/${encodeURIComponent(roomName)}`);

            if (response.status == 404 || response.status == 401) {
                alert('Room does not exist');
                return;
            }

            currentRoom = await response.json();
            addTab(currentRoom);

            localStorage.setItem('lastRoom', roomName);
            localStorage.setItem('lastRoomData', JSON.stringify(currentRoom));

            await loadMessages(true);

            ws.send(JSON.stringify({type: 'join', room: roomName, skipBroadcast: skipArchive}));

            //send creation message - do NOT send join message
            if (isCreation) {
                const creationContent = `${currentUser.username} created "${roomName}"`;

                ws.send(JSON.stringify({
                    type: 'message',
                    content: creationContent,
                    room_id: currentRoom.RoomID,
                    user_id: currentUser.id,
                    message_type: 'system'
                }));

                //archive creation message
                await fetch('api/messages', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        room_id: currentRoom.RoomID,
                        user_id: currentUser.id,
                        content: creationContent,
                        message_type: 'system'
                    })
                });
                return
            }

            //archive join message
            if (!skipArchive) {
                await fetch('/api/messages', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        room_id: currentRoom.RoomID,
                        user_id: currentUser.id,
                        content: `${currentUser.username} joined the room`,
                    })
                }).catch(err => {
                    console.error('Failed to archive join message:', err);
                });
            }
        }

        async function createRoom() {
            if (!currentUser) {
                console.error('No user logged in');
                return;
            }
            const roomName = document.getElementById('room').value;
            const errorDiv = document.getElementById('roomError');
            try {
                const response = await fetch(`/api/rooms/${encodeURIComponent(roomName)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include'
                });

                const data = await response.json();

                if (response.ok) {
                    errorDiv.style.color = 'green';
                    errorDiv.textContent = 'Room created! Joining...';
                    setTimeout(() => {
                        joinRoom(false, true)
                    }, 1000);
                } else {
                    errorDiv.style.color = 'red';
                    errorDiv.textContent = data.error || 'Failed to create room';
                }
            } catch (error) {
                errorDiv.style.color = 'red';
                errorDiv.textContent = 'Error connecting to server';
            }
        }

        function sendMessage() {
            const content = document.getElementById('message').value;
            if (content == "") {
                return
            }
            ws.send(JSON.stringify({type: 'message', content: content}));
            document.getElementById('message').value = '';

            //archive message in history
            fetch('/api/messages', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    room_id: currentRoom.RoomID,
                    user_id: currentUser.id,
                    content: content
                })
            }).catch(err => {
                console.error('Failed to archive message:', err);
            })
        }

        let currentPage = 1;
        const messagesPerPage = 50;
        async function loadMessages(resetPage = true) {
            if (resetPage) {
                currentPage = 1;
                document.getElementById('messages').innerHTML = '';
            }

            const response = await fetch(`/api/messages/${currentRoom.RoomID}?page=${currentPage}&limit=${messagesPerPage}`);
            console.log('Response status:', response.status); //DEBUG


            if (!response.ok) {
                console.error('Failed to load messages');
                return
            }

            const messages = await response.json();
            console.log('Messages response:', messages); //DEBUG

            //Display messages
            messages.forEach(msg => {
                const div = document.createElement('div');
                if (msg.message_type === 'system') {
                    div.className = 'system';
                    div.textContent = msg.content;
                } else {
                    div.textContent = `${msg.Username}: ${msg.Content}`;
                }
                document.getElementById('messages').appendChild(div);
            });
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

            currentPage++
        }
        //load when scrolling
        document.getElementById('messages').addEventListener('scroll', function() {
            if (this.scrollTop === 0) {
                loadMessages(false);
            }
        });

        function addTab(roomData, save = true) {
            const roomId = roomData.RoomID;
            const roomName = roomData.RoomName;

            // Check if tab already exists
            if (tabs.find(t => t.RoomID === roomId)) {
                return; // Tab already open
            }
            
            // Add to array
            tabs.push(roomData);
            activeTabId = roomId;
            
            // Create DOM element
            const tabBar = document.getElementById('tabBar');
            const tab = document.createElement('button');
            tab.className = 'tab active';
            tab.dataset.roomId = roomId;
            tab.innerHTML = `${roomName} <span class="close" data-room-id="${roomId}">✕</span>`;
            
            tab.addEventListener('click', (e) => {
                if (e.target.classList.contains('close')) {
                    e.stopPropagation();
                    closeTab(roomId);
                    return;
                }
                switchTab(roomId);
            });
            
            tabBar.appendChild(tab);
            if (save) saveTabs();
        }

        function switchTab(roomId, save = true) {
            const room = tabs.find(t => t.RoomID === roomId);
            if (!room) return;
            
            activeTabId = roomId;
            
            // Update DOM classes
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-room-id="${roomId}"]`).classList.add('active');
            
            // Load messages for this room
            currentRoom = room;
            loadMessages(true);
            if (save) saveTabs();
        }

        function closeTab(roomId) {
            // Send WebSocket leave
            ws.send(JSON.stringify({type: 'leave', room: roomId}));
            
            // Remove from DOM
            const tabElement = document.querySelector(`.tab[data-room-id="${roomId}"]`);
            if (tabElement) tabElement.remove();
            
            // Remove from array
            tabs = tabs.filter(t => t.RoomID !== roomId);
            
            // If active tab was closed, switch to another
            if (activeTabId === roomId) {
                if (tabs.length > 0) {
                    switchTab(tabs[0].RoomID);
                } else {
                    activeTabId = null;
                    document.getElementById('messages').innerHTML = '';
                }
            }
            saveTabs();
        }

        function saveTabs() {
            localStorage.setItem('openTabs', JSON.stringify(tabs));
            localStorage.setItem('activeTabId', activeTabId);
        }

        function loadTabs() {
            const savedTabs = localStorage.getItem('openTabs');
            if (!savedTabs) return;
            
            const parsed = JSON.parse(savedTabs);
            
            // Add all tabs without saving
            parsed.forEach(roomData => {
                const roomId = roomData.RoomID;
                const roomName = roomData.RoomName;
                
                // Check if tab already exists
                if (tabs.find(t => t.RoomID === roomId)) {
                    return;
                }
                
                tabs.push(roomData);
                
                // Create DOM element
                const tabBar = document.getElementById('tabBar');
                const tab = document.createElement('button');
                tab.className = 'tab';
                tab.dataset.roomId = roomId;
                tab.innerHTML = `${roomName} <span class="close" data-room-id="${roomId}">✕</span>`;
                
                tab.addEventListener('click', (e) => {
                    if (e.target.classList.contains('close')) {
                        e.stopPropagation();
                        closeTab(roomId);
                        return;
                    }
                    switchTab(roomId);
                });
                
                tabBar.appendChild(tab);
            });
            
            // Restore active tab
            const savedActive = localStorage.getItem('activeTabId');
            if (savedActive && tabs.find(t => t.RoomID === savedActive)) {
                switchTab(savedActive, false);
            } else if (tabs.length > 0) {
                switchTab(tabs[0].RoomID, false);
            }
        }

        async function logout() {
            const response = await fetch('api/logout', {
                method: 'POST',
                credentials: 'same-origin'
            });

            if (response.ok) {
                //window.location.href = '/login.html';
                localStorage.removeItem('lastRoom');
                localStorage.removeItem('lastRoomData');
                localStorage.removeItem('openTabs');
                localStorage.removeItem('activeTabId');
                window.location.reload()
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            const response = await fetch('/api/me');
            if (response.ok) {
                const user = await response.json();
                currentUser = user;
                connect();

                loadTabs();

                if (tabs.length === 0) {
                    const lastRoomName = localStorage.getItem('lastRoom');
                    
                    if (lastRoomName) {
                        document.getElementById('room').value = lastRoomName;
                        
                        // Verify room still exists via API
                        const roomResponse = await fetch(`/api/rooms/${encodeURIComponent(lastRoomName)}`);
                        
                        if (roomResponse.ok) {
                            currentRoom = await roomResponse.json();
                            await joinRoom(true);
                            // Don't archive join message on refresh
                        } else {
                            // Room was deleted, clear localStorage
                            localStorage.removeItem('lastRoom');
                            localStorage.removeItem('lastRoomData');
                        }
                    }
                }
            } else {
                localStorage.removeItem('lastRoom');
                localStorage.removeItem('lastRoomData');
                localStorage.removeItem('openTabs');
                localStorage.removeItem('activeTabId');
                window.location.href = "/login.html";
            }
        });
    </script>
</body>
</html>
