<!DOCTYPE html>
<html>
<head>
    <title>Go Chat</title>
    <style>
        .container {
            display: flex;
            gap: 20px;
            width: 100%;
        }
        .chat-section {
            flex: 3;
        }
        #messages { height: 300px; width: 50%; margin: 0; box-sizing: border-box; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; }
        .system { color: #888; font-style: italic; }
    </style>
</head>
<body>
    <button onclick="logout()" style="position: fixed; top: 10px; right: 10px; padding: 8px 16px;">Logout</button>
    <h1>Go Chat with Rooms</h1>
    <h2 id="welcome"></h2>
    <div class="container">
        <div class="chat-section">
            <div>
                <input type="text" id="room" placeholder="Room name">
            </div>
            <div>
                <button onclick="joinRoom(false)">Join Room</button>
                <button onclick="createRoom()">Create Room</button>
            </div>
            <div>Current Room: <span id="currentRoomName"></span></div>
            <div id="roomError" style="color: red; margin-top: 10px;"></div>
            <div id="messages"></div>
            <div>
                <input type="text" id="message" placeholder="Message" onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
    <script src="/static/js/api.js"></script>
    <script>
        let ws;

        function connect() {
            //const username = document.getElementById('username').value || 'anonymous';
            if (!currentUser) return;
            ws = new WebSocket(`ws://localhost:8080/ws?username=${currentUser.username}`);

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                const div = document.createElement('div');
                if (msg.type === 'join' || msg.type === 'leave') {
                    div.className = 'system';
                    div.textContent = msg.content;
                } else {
                    div.textContent = `${msg.username}: ${msg.content}`;
                }
                document.getElementById('messages').appendChild(div);
            };
        }

        let currentRoom = null;
        async function joinRoom(skipArchive = false, isCreation = false) {
            const roomName = document.getElementById('room').value;

            const response = await fetch(`/api/rooms/${encodeURIComponent(roomName)}`);

            if (response.status == 404 || response.status == 401) {
                alert('Room does not exist');
                return;
            }

            currentRoom = await response.json();
            document.getElementById('currentRoomName').textContent = currentRoom.RoomName || '';

            localStorage.setItem('lastRoom', roomName);
            localStorage.setItem('lastRoomData', JSON.stringify(currentRoom));

            await loadMessages(true);

            ws.send(JSON.stringify({type: 'join', room: roomName, skipBroadcast: skipArchive}));

            //send creation message - do NOT send join message
            if (isCreation) {
                const creationContent = `${currentUser.username} created "${roomName}"`;

                ws.send(JSON.stringify({
                    type: 'message',
                    content: creationContent,
                    room_id: currentRoom.RoomID,
                    user_id: currentUser.id,
                    message_type: 'system'
                }));

                //archive creation message
                await fetch('api/messages', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        room_id: currentRoom.RoomID,
                        user_id: currentUser.id,
                        content: creationContent,
                        message_type: 'system'
                    })
                });
                return
            }

            //archive join message
            if (!skipArchive) {
                await fetch('/api/messages', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        room_id: currentRoom.RoomID,
                        user_id: currentUser.id,
                        content: `${currentUser.username} joined the room`,
                    })
                }).catch(err => {
                    console.error('Failed to archive join message:', err);
                });
            }
        }

        async function createRoom() {
            if (!currentUser) {
                console.error('No user logged in');
                return;
            }
            const roomName = document.getElementById('room').value;
            const errorDiv = document.getElementById('roomError');
            try {
                const response = await fetch(`/api/rooms/${encodeURIComponent(roomName)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include'
                });

                const data = await response.json();

                if (response.ok) {
                    errorDiv.style.color = 'green';
                    errorDiv.textContent = 'Room created! Joining...';
                    setTimeout(() => {
                        joinRoom(false, true)
                    }, 1000);
                } else {
                    errorDiv.style.color = 'red';
                    errorDiv.textContent = data.error || 'Failed to create room';
                }
            } catch (error) {
                errorDiv.style.color = 'red';
                errorDiv.textContent = 'Error connecting to server';
            }
        }

        function sendMessage() {
            const content = document.getElementById('message').value;
            if (content == "") {
                return
            }
            ws.send(JSON.stringify({type: 'message', content: content}));
            document.getElementById('message').value = '';

            //archive message in history
            fetch('/api/messages', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    room_id: currentRoom.RoomID,
                    user_id: currentUser.id,
                    content: content
                })
            }).catch(err => {
                console.error('Failed to archive message:', err);
            })
        }

        let currentPage = 1;
        const messagesPerPage = 50;
        async function loadMessages(resetPage = true) {
            if (resetPage) {
                currentPage = 1;
                document.getElementById('messages').innerHTML = '';
            }

            const response = await fetch(`/api/messages/${currentRoom.RoomID}?page=${currentPage}&limit=${messagesPerPage}`);
            console.log('Response status:', response.status); //DEBUG


            if (!response.ok) {
                console.error('Failed to load messages');
                return
            }

            const messages = await response.json();
            console.log('Messages response:', messages); //DEBUG

            //Display messages
            messages.forEach(msg => {
                const div = document.createElement('div');
                if (msg.message_type === 'system') {
                    div.className = 'system';
                    div.textContent = msg.content;
                } else {
                    div.textContent = `${msg.Username}: ${msg.Content}`;
                }
                document.getElementById('messages').appendChild(div);
            });
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;

            currentPage++
        }
        //load when scrolling
        document.getElementById('messages').addEventListener('scroll', function() {
            if (this.scrollTop === 0) {
                loadMessages(false);
            }
        });

        async function logout() {
            const response = await fetch('api/logout', {
                method: 'POST',
                credentials: 'same-origin'
            });

            if (response.ok) {
                //window.location.href = '/login.html';
                localStorage.removeItem('lastRoom');
                localStorage.removeItem('lastRoomData');
                window.location.reload()
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            const response = await fetch('/api/me');
            if (response.ok) {
                const user = await response.json();
                currentUser = user;
                connect();

                const lastRoomName = localStorage.getItem('lastRoom');
                
                if (lastRoomName) {
                    document.getElementById('room').value = lastRoomName;
                    
                    // Verify room still exists via API
                    const roomResponse = await fetch(`/api/rooms/${encodeURIComponent(lastRoomName)}`);
                    
                    if (roomResponse.ok) {
                        currentRoom = await roomResponse.json();
                        await joinRoom(true);
                        // Don't archive join message on refresh
                    } else {
                        // Room was deleted, clear localStorage
                        localStorage.removeItem('lastRoom');
                        localStorage.removeItem('lastRoomData');
                    }
                }
            } else {
                localStorage.removeItem('lastRoom');
                localStorage.removeItem('lastRoomData');
                window.location.href = "/login.html";
            }
        });
    </script>
</body>
</html>
