<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
        /* Simple centering - no fancy styles */
        body {
            margin: 0;
            padding: 0;
            text-align: center;  /* Centers inline content horizontally */
        }
        h1, input, button, br {
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        h1 {
            margin-top: 50px;    /* Just some space from top, keeps it centered visually */
            margin-bottom: 20px;
        }
        input {
            margin-bottom: 15px;
            padding: 5px 10px;
        }
        button {
            margin-top: 5px;
            padding: 5px 15px;
        }
    </style>
</head>
<body>
    <h1>Sign Up</h1>
    <input type="text" placeholder="username">
    <input type="password" placeholder="password">
    <button>Sign Up</button>
</body>
</html>
