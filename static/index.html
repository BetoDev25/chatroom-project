<!DOCTYPE html>
<html>
<head>
    <title>Go Chat</title>
    <style>
        .container {
            display: flex;
            gap: 20px;
            width: 100%;
        }
        .chat-section {
            flex: 3;
        }
        .dynamic-panel {
            flex: 1;
            border-left: 1px solid #ccc;
            padding-left: 20px;
        }
        #messages { height: 300px; overflow-y: scroll; border: 1px solid #ccc; padding: 10px; }
        .system { color: #888; font-style: italic; }
    </style>
</head>
<body>
    <h1>Go Chat with Rooms</h1>
    <div class="container">
        <div class="chat-section">
            <div>
                <input type="text" id="room" placeholder="Room name">
                <button onclick="joinRoom()">Join Room</button>
            </div>
            <div id="messages"></div>
            <div>
                <input type="text" id="message" placeholder="Message" onkeypress="if(event.key==='Enter')sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
        <div id="panel" class="dynamic-panel"></div>
    </div>

    <script>
        // Logic to load any HTML file in the dynamic panel
        function loadPanel(htmlFile) {
            fetch(htmlFile)
                .then(response => response.text())
                .then(html => {
                    document.getElementById('panel').innerHTML = html;
                    
                    // Find and execute all script tags in the loaded HTML
                    const panel = document.getElementById('panel');
                    const scripts = panel.querySelectorAll('script');
                    scripts.forEach(oldScript => {
                        const newScript = document.createElement('script');
                        // Copy the content
                        newScript.textContent = oldScript.textContent;
                        // Copy any attributes (like src, type, etc.)
                        if (oldScript.src) {
                            newScript.src = oldScript.src;
                        }
                        // Replace the old script with the new one
                        oldScript.parentNode.replaceChild(newScript, oldScript);
                    });
                })
                .catch(error => {
                    console.error('Error loading panel:', error);
                    document.getElementById('panel').innerHTML = '<p style="color:red">Failed to load panel</p>';
                });
        }

        loadPanel('signup.html')

        let ws;

        function connect() {
            const username = document.getElementById('username').value || 'anonymous';
            ws = new WebSocket(`ws://localhost:8080/ws?username=${username}`);

            ws.onmessage = function(event) {
                const msg = JSON.parse(event.data);
                const div = document.createElement('div');
                if (msg.type === 'join' || msg.type === 'leave') {
                    div.className = 'system';
                    div.textContent = msg.content;
                } else {
                    div.textContent = `${msg.username}: ${msg.content}`;
                }
                document.getElementById('messages').appendChild(div);
            };
        }

        function joinRoom() {
            const room = document.getElementById('room').value;
            ws.send(JSON.stringify({type: 'join', room: room}));
        }

        function sendMessage() {
            const content = document.getElementById('message').value;
            ws.send(JSON.stringify({type: 'message', content: content}));
            document.getElementById('message').value = '';
        }
    </script>
</body>
</html>
