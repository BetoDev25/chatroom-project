<h1>Login</h1>
<input type="text" id="username" placeholder="username">
<div style="height: 10px;"></div>

<input type="password" id="password" placeholder="password">
<div style="height: 10px;"></div>

<button onclick="login()">Log in</button>
<div id="message" style="margin-top: 10px; color: #333;"></div>
<p style="margin-top: 10px;">
    <a href="/signup.html">create new user</a>
</p>

<script>
    console.log('Login function defined:', typeof login);
    async function login() {
        console.log('1. Login function started'); //debug
        const usernameVal = document.getElementById('username').value;
        const passwordVal = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        if (!usernameVal || !passwordVal) {
            messageDiv.style.color = 'red';
            messageDiv.textContent = 'Please enter both username and password';
            return;
        }

        try {
            console.log('2. About to fetch /api/login'); //debug
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username: usernameVal,
                    password: passwordVal
                })
            });

            console.log('3. Response received, status:', response.status); //debug
            const data = await response.json();
            console.log('4. Response data:', data); //debug

            if (response.ok) {
                console.log('5. Login successful, will redirect in 1 second'); //debug
                setTimeout(() => {
                    console.log('6. Current URL before redirect:', window.location.href); //debug
                    window.location.href = '/index.html';
                    console.log('7. After setting window.location.href');
                }, 1000);
            } else {
                console.log('5. Login failed'); //debug
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'username or password incorrect';
            }
        } catch (error) {
            messageDiv.style.color = 'red';
            messageDiv.textContent = 'Error connecting to server';
        }
    }
</script>
