<h1>Login</h1>
<form onsubmit="login(event)">
    <input type="text" id="username" placeholder="username" onkeypress="if(event.key==='Enter')login(event)">
    <div style="height: 10px;"></div>

    <input type="password" id="password" placeholder="password" onkeypress="if(event.key==='Enter')login(event)">
    <div style="height: 10px;"></div>

    <button type="submit">Log in</button>
    <div id="message" style="margin-top: 10px; color: #333;"></div>
    <p style="margin-top: 10px;">
        <a href="/signup.html">create new user</a>
    </p>
</form>

<script>
    localStorage.removeItem('lastRoom');
    localStorage.removeItem('lastRoomData');
    async function login(event) {
        event.preventDefault();
        console.log('login() called');
        const usernameVal = document.getElementById('username').value;
        const passwordVal = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');

        if (!usernameVal || !passwordVal) {
            messageDiv.style.color = 'red';
            messageDiv.textContent = 'Please enter both username and password';
            return;
        }

        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    username: usernameVal,
                    password: passwordVal
                })
            });

            const data = await response.json();

            if (response.ok) {
                setTimeout(() => {
                    window.location.href = '/index.html';
                }, 1000);
            } else {
                messageDiv.style.color = 'red';
                messageDiv.textContent = 'username or password incorrect';
            }
        } catch (error) {
            messageDiv.style.color = 'red';
            messageDiv.textContent = 'Error connecting to server';
        }
    }
</script>
